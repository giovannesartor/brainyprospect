# Build do nixpacks — Railway usará isto se existir.
# Garante Python 3.11 + dependências do sistema para psycopg2/lxml/bcrypt.

[phases.setup]
nixPkgs = ["python311", "gcc", "libffi", "openssl"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[phases.build]
cmds = ["echo 'no build step'"]

[start]
cmd = "uvicorn web_main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 75"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
