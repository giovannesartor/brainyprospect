<!DOCTYPE html>
<html lang="pt-BR" x-data="{ theme: localStorage.getItem('bp_theme') || 'dark' }"
      x-init="$watch('theme', v => { localStorage.setItem('bp_theme', v); document.documentElement.dataset.theme = v; }); document.documentElement.dataset.theme = theme;"
      :data-theme="theme">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)" />
  <title>{% block title %}Brainy Prospect{% endblock %}</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Brainy" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23g)' d='M13 2L4 14h7l-1 8 9-12h-7l1-8z'/%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root,
    [data-theme="dark"] {
      --bg: #0a0a0f;
      --bg-soft: #14141d;
      --bg-elev: rgba(20,20,30,0.72);
      --bg-input: #16161e;
      --border: rgba(255,255,255,0.08);
      --border-soft: rgba(255,255,255,0.04);
      --border-strong: rgba(255,255,255,0.14);
      --text: #e6e7eb;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --accent-soft: rgba(99,102,241,0.18);
      --accent-ring: rgba(99,102,241,0.35);
      --hover: rgba(255,255,255,0.05);
      --row-hover: rgba(255,255,255,0.025);
      --shadow-sm: 0 4px 12px rgba(0,0,0,.25);
      --shadow: 0 12px 32px rgba(0,0,0,.45);
      --shadow-lg: 0 30px 70px -25px rgba(0,0,0,.7);
      --grain: radial-gradient(circle at 0% 0%, rgba(99,102,241,.10), transparent 35%),
               radial-gradient(circle at 100% 100%, rgba(139,92,246,.08), transparent 35%);
      color-scheme: dark;
    }
    [data-theme="light"] {
      --bg: #f4f5f9;
      --bg-soft: #ffffff;
      --bg-elev: rgba(255,255,255,0.92);
      --bg-input: #ffffff;
      --border: rgba(15,23,42,0.10);
      --border-soft: rgba(15,23,42,0.05);
      --border-strong: rgba(15,23,42,0.18);
      --text: #0f172a;
      --text-muted: #475569;
      --text-dim: #64748b;
      --accent: #4f46e5;
      --accent-2: #7c3aed;
      --accent-soft: rgba(99,102,241,0.10);
      --accent-ring: rgba(99,102,241,0.30);
      --hover: rgba(15,23,42,0.04);
      --row-hover: rgba(15,23,42,0.02);
      --shadow-sm: 0 2px 8px rgba(15,23,42,.06);
      --shadow: 0 12px 32px rgba(15,23,42,.10);
      --shadow-lg: 0 30px 80px -25px rgba(15,23,42,.20);
      --grain: radial-gradient(circle at 0% 0%, rgba(99,102,241,.07), transparent 35%),
               radial-gradient(circle at 100% 100%, rgba(139,92,246,.05), transparent 35%);
      color-scheme: light;
    }
    * { -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); color: var(--text); }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; min-height: 100dvh;
      background-image: var(--grain);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ======= Surfaces ======= */
    .glass {
      background: var(--bg-elev);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .glass::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.04), transparent 30%);
      opacity: .6;
    }
    [data-theme="light"] .glass::before {
      background: linear-gradient(180deg, rgba(255,255,255,.7), transparent 40%);
    }
    .surface { background: var(--bg-soft); border: 1px solid var(--border); }
    .elev    { box-shadow: var(--shadow); }
    .elev-lg { box-shadow: var(--shadow-lg); }

    /* ======= Buttons ======= */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      box-shadow: 0 8px 24px -8px var(--accent-ring), inset 0 1px 0 rgba(255,255,255,.18);
      transition: filter .15s, transform .05s, box-shadow .15s;
    }
    .btn-primary:hover { filter: brightness(1.08); box-shadow: 0 12px 32px -8px var(--accent-ring), inset 0 1px 0 rgba(255,255,255,.22); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-ghost {
      background: var(--hover);
      border: 1px solid var(--border);
      color: var(--text);
      transition: background .15s, border-color .15s;
    }
    .btn-ghost:hover { background: var(--border); border-color: var(--border-strong); }

    /* ======= Icon utilities ======= */
    .icon { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; flex-shrink: 0; }
    .icon-sm { width: .875em; height: .875em; }
    .icon-lg { width: 1.25em; height: 1.25em; }
    .icon-xl { width: 1.5em; height: 1.5em; }
    .icon-box {
      width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    }
    .icon-box-lg { width: 44px; height: 44px; border-radius: 12px; font-size: 18px; }

    /* ======= Sidebar nav items ======= */
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13.5px; font-weight: 500;
      color: var(--text-muted);
      border: 1px solid transparent;
      transition: background .15s, color .15s, border-color .15s, transform .05s;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--hover); color: var(--text); }
    .nav-item.active {
      background: linear-gradient(180deg, var(--accent-soft), color-mix(in srgb, var(--accent) 8%, transparent));
      color: var(--text);
      border-color: color-mix(in srgb, var(--accent) 30%, transparent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .nav-item.active .icon-mini { color: var(--accent); }
    .icon-mini {
      width: 18px; height: 18px;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .nav-item:hover .icon-mini { color: var(--text); }

    /* ======= Brand ======= */
    .brand-mark {
      width: 38px; height: 38px;
      border-radius: 11px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; box-shadow: 0 8px 24px -8px var(--accent-ring), inset 0 1px 0 rgba(255,255,255,.25);
    }

    /* ======= KPI cards ======= */
    .kpi {
      position: relative;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      transition: transform .15s, border-color .15s, box-shadow .15s;
      overflow: hidden;
    }
    .kpi:hover { transform: translateY(-1px); border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
    .kpi .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); font-weight: 600; }
    .kpi .kpi-value { font-size: 26px; font-weight: 700; line-height: 1.1; margin-top: 4px; }
    .kpi .kpi-hint  { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .kpi .kpi-icon  {
      position: absolute; top: 12px; right: 12px;
      width: 30px; height: 30px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--accent-soft); color: var(--accent);
    }

    /* ======= Section headings ======= */
    .section-title {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 15px;
    }
    .section-title .icon-box { width: 28px; height: 28px; border-radius: 8px; font-size: 14px; }

    /* ======= Badges ======= */
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
    [data-theme="dark"] .badge-success { background:#064e3b; color:#6ee7b7; }
    [data-theme="dark"] .badge-warn    { background:#78350f; color:#fcd34d; }
    [data-theme="dark"] .badge-danger  { background:#7f1d1d; color:#fca5a5; }
    [data-theme="dark"] .badge-info    { background:#1e3a8a; color:#93c5fd; }
    [data-theme="dark"] .badge-muted   { background:#374151; color:#d1d5db; }
    [data-theme="light"] .badge-success { background:#d1fae5; color:#047857; }
    [data-theme="light"] .badge-warn    { background:#fef3c7; color:#b45309; }
    [data-theme="light"] .badge-danger  { background:#fee2e2; color:#b91c1c; }
    [data-theme="light"] .badge-info    { background:#dbeafe; color:#1d4ed8; }
    [data-theme="light"] .badge-muted   { background:#e2e8f0; color:#334155; }

    /* ======= Tables ======= */
    table { width:100%; border-collapse: separate; border-spacing: 0; }
    th { text-align:left; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); padding:12px 14px; border-bottom:1px solid var(--border); background: var(--bg-soft); position: sticky; top: 0; z-index: 1; }
    td { padding:12px 14px; border-bottom:1px solid var(--border-soft); font-size:14px; color:var(--text); }
    tr:hover td { background: var(--row-hover); }

    /* ======= Inputs ======= */
    input, select, textarea {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 9px;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus { outline:none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }

    /* ======= Scrollbars ======= */
    .scrollbar::-webkit-scrollbar { width:8px; height:8px; }
    .scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius:4px; }
    .scrollbar::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .pulse { animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:.55;} 50%{opacity:1;} }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .text-muted { color: var(--text-muted); }
    .text-dim   { color: var(--text-dim); }
    .text-default { color: var(--text); }
    .hover\:text-default:hover { color: var(--text); }
    .border-soft { border-color: var(--border-soft) !important; }

    /* ======= Toasts ======= */
    .toast {
      animation: slidein .25s ease;
      box-shadow: var(--shadow);
    }
    @keyframes slidein { from { transform: translateX(20px); opacity:0; } to { transform: translateX(0); opacity:1; } }

    /* ======= Empty state ======= */
    .empty-state {
      text-align: center; padding: 40px 16px;
    }
    .empty-state .icon-box-lg {
      margin: 0 auto 12px;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .empty-state p { color: var(--text-muted); font-size: 14px; }

    @media (max-width: 767px) {
      th, td { padding: 10px 12px; font-size: 13px; }
      .glass { border-radius: 14px; }
      .kpi .kpi-value { font-size: 22px; }
    }
    [x-cloak] { display: none !important; }
  </style>
  {% block head %}{% endblock %}
</head>

  {% block body %}{% endblock %}

  <!-- Toast container (global) -->
  <div id="bp-toasts" class="fixed bottom-4 right-4 z-[60] flex flex-col gap-2 max-w-[90vw] sm:max-w-sm pointer-events-none"></div>
  <script>
  <script>
    window.bpToast = function(msg, type='info', ttl=3500) {
      const wrap = document.getElementById('bp-toasts');
      if (!wrap) return;
      const colors = {
        info:    'border-indigo-500/40',
        success: 'border-emerald-500/40',
        warn:    'border-amber-500/40',
        error:   'border-rose-500/40',
      };
      const el = document.createElement('div');
      el.className = `toast glass pointer-events-auto px-4 py-3 rounded-lg text-sm border ${colors[type]||colors.info}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .25s'; setTimeout(()=>el.remove(), 250); }, ttl);
    };
  </script>

  <!-- PWA: registrar service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW falhou:', err));
      });
    }
    // Helper para notificações do navegador (push local quando job termina)
    window.bpNotify = function(title, body) {
      try {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'granted') {
          if (navigator.serviceWorker?.controller) {
            navigator.serviceWorker.controller.postMessage({ type: 'job-done', message: body });
          } else {
            new Notification(title, { body, icon: '/static/icon-192.png' });
          }
        }
      } catch(e) { /* silencioso */ }
    };
    window.bpRequestNotify = async function() {
      if (!('Notification' in window)) return false;
      if (Notification.permission === 'granted') return true;
      if (Notification.permission === 'denied') return false;
      const p = await Notification.requestPermission();
      return p === 'granted';
    };
  </script>
</body>
