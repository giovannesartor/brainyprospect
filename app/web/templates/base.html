<!DOCTYPE html>
<html lang="pt-BR" x-data="{ theme: localStorage.getItem('bp_theme') || 'dark' }"
      x-init="$watch('theme', v => { localStorage.setItem('bp_theme', v); document.documentElement.dataset.theme = v; }); document.documentElement.dataset.theme = theme;"
      :data-theme="theme">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)" />
  <title>{% block title %}Brainy Prospect{% endblock %}</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Brainy" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⚡%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root,
    [data-theme="dark"] {
      --bg: #0a0a0f;
      --bg-soft: #14141d;
      --bg-elev: rgba(20,20,30,0.7);
      --bg-input: #16161e;
      --border: rgba(255,255,255,0.08);
      --border-soft: rgba(255,255,255,0.04);
      --text: #e6e7eb;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --hover: rgba(255,255,255,0.05);
      --row-hover: rgba(255,255,255,0.02);
      --shadow: 0 8px 24px rgba(0,0,0,.35);
      color-scheme: dark;
    }
    [data-theme="light"] {
      --bg: #f6f7fb;
      --bg-soft: #ffffff;
      --bg-elev: rgba(255,255,255,0.85);
      --bg-input: #ffffff;
      --border: rgba(15,23,42,0.10);
      --border-soft: rgba(15,23,42,0.05);
      --text: #0f172a;
      --text-muted: #475569;
      --text-dim: #64748b;
      --accent: #4f46e5;
      --accent-2: #7c3aed;
      --hover: rgba(15,23,42,0.04);
      --row-hover: rgba(15,23,42,0.02);
      --shadow: 0 8px 24px rgba(15,23,42,.08);
      color-scheme: light;
    }
    * { -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); color: var(--text); }
    body { font-family: 'Inter', system-ui, sans-serif; min-height:100vh; min-height:100dvh; }

    .glass {
      background: var(--bg-elev);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .surface { background: var(--bg-soft); border: 1px solid var(--border); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      transition: filter .15s, transform .05s;
    }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-ghost {
      background: var(--hover);
      border: 1px solid var(--border);
      color: var(--text);
      transition: background .15s;
    }
    .btn-ghost:hover { background: var(--border); }

    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; display: inline-block; }
    [data-theme="dark"] .badge-success { background:#064e3b; color:#6ee7b7; }
    [data-theme="dark"] .badge-warn    { background:#78350f; color:#fcd34d; }
    [data-theme="dark"] .badge-danger  { background:#7f1d1d; color:#fca5a5; }
    [data-theme="dark"] .badge-info    { background:#1e3a8a; color:#93c5fd; }
    [data-theme="dark"] .badge-muted   { background:#374151; color:#d1d5db; }
    [data-theme="light"] .badge-success { background:#d1fae5; color:#047857; }
    [data-theme="light"] .badge-warn    { background:#fef3c7; color:#b45309; }
    [data-theme="light"] .badge-danger  { background:#fee2e2; color:#b91c1c; }
    [data-theme="light"] .badge-info    { background:#dbeafe; color:#1d4ed8; }
    [data-theme="light"] .badge-muted   { background:#e2e8f0; color:#334155; }

    table { width:100%; border-collapse: separate; border-spacing: 0; }
    th { text-align:left; font-weight:600; font-size:12px; text-transform:uppercase; color:var(--text-muted); padding:10px 12px; border-bottom:1px solid var(--border); }
    td { padding:10px 12px; border-bottom:1px solid var(--border-soft); font-size:14px; color:var(--text); }
    tr:hover td { background: var(--row-hover); }

    input, select, textarea {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
    }
    input:focus, select:focus, textarea:focus { outline:none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }

    .scrollbar::-webkit-scrollbar { width:8px; height:8px; }
    .scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius:4px; }
    .scrollbar::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .pulse { animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:.55;} 50%{opacity:1;} }

    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .text-muted { color: var(--text-muted); }
    .text-dim { color: var(--text-dim); }

    /* Toasts */
    .toast {
      animation: slidein .25s ease;
      box-shadow: var(--shadow);
    }
    @keyframes slidein { from { transform: translateX(20px); opacity:0; } to { transform: translateX(0); opacity:1; } }

    /* Mobile-first tweaks */
    @media (max-width: 767px) {
      th, td { padding: 8px 10px; font-size: 13px; }
      .glass { border-radius: 12px; }
    }
    [x-cloak] { display: none !important; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen">
  {% block body %}{% endblock %}

  <!-- Toast container (global) -->
  <div id="bp-toasts" class="fixed bottom-4 right-4 z-[60] flex flex-col gap-2 max-w-[90vw] sm:max-w-sm pointer-events-none"></div>
  <script>
    window.bpToast = function(msg, type='info', ttl=3500) {
      const wrap = document.getElementById('bp-toasts');
      if (!wrap) return;
      const colors = {
        info:    'border-indigo-500/40',
        success: 'border-emerald-500/40',
        warn:    'border-amber-500/40',
        error:   'border-rose-500/40',
      };
      const el = document.createElement('div');
      el.className = `toast glass pointer-events-auto px-4 py-3 rounded-lg text-sm border ${colors[type]||colors.info}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .25s'; setTimeout(()=>el.remove(), 250); }, ttl);
    };
  </script>

  <!-- PWA: registrar service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW falhou:', err));
      });
    }
    // Helper para notificações do navegador (push local quando job termina)
    window.bpNotify = function(title, body) {
      try {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'granted') {
          if (navigator.serviceWorker?.controller) {
            navigator.serviceWorker.controller.postMessage({ type: 'job-done', message: body });
          } else {
            new Notification(title, { body, icon: '/static/icon-192.png' });
          }
        }
      } catch(e) { /* silencioso */ }
    };
    window.bpRequestNotify = async function() {
      if (!('Notification' in window)) return false;
      if (Notification.permission === 'granted') return true;
      if (Notification.permission === 'denied') return false;
      const p = await Notification.requestPermission();
      return p === 'granted';
    };
  </script>
</body>
</html>
