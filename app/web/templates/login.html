{% extends "base.html" %}
{% block title %}Entrar — Brainy Prospect{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center px-4 py-10 relative overflow-hidden">
  <div class="absolute inset-0 -z-10 opacity-60 pointer-events-none"
       style="background: radial-gradient(circle at 20% 10%, rgba(99,102,241,0.18), transparent 45%), radial-gradient(circle at 80% 80%, rgba(139,92,246,0.18), transparent 45%);"></div>
  <div class="w-full max-w-md" x-data="loginPage()">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold tracking-tight inline-flex items-center gap-2"><span class="brand-mark"><svg class="icon icon-lg"><use href="#i-bolt"/></svg></span> Brainy Prospect</h1>
      <p class="text-sm text-muted mt-2">Plataforma B2B com IA</p>
    </div>

    <div class="glass rounded-2xl p-6 md:p-8">
      <h2 class="text-xl font-semibold mb-6">Entrar na sua conta</h2>

      <form @submit.prevent="submit()" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-muted mb-1.5">Email</label>
          <input type="email" required x-model="email" autocomplete="email"
                 class="w-full px-3 py-2.5" placeholder="voce@empresa.com" />
        </div>
        <div>
          <label class="block text-xs font-medium text-muted mb-1.5">Senha</label>
          <input type="password" required x-model="password" autocomplete="current-password"
                 class="w-full px-3 py-2.5" placeholder="••••••••" />
        </div>

        <div x-show="error" x-cloak class="text-sm text-rose-500 bg-rose-500/10 border border-rose-500/30 rounded-lg p-3" x-text="error"></div>

        <button type="submit" :disabled="loading"
                class="btn-primary w-full py-2.5 rounded-lg font-semibold disabled:opacity-50">
          <span x-show="!loading">Entrar</span>
          <span x-show="loading" class="pulse">Entrando…</span>
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-muted">
        Não tem conta?
        <a href="/register" class="text-indigo-500 hover:text-indigo-400 font-medium">Criar conta</a>
      </div>
    </div>

    <div class="flex items-center justify-center gap-3 mt-6 text-xs text-dim">
      <span>© 2026 Brainy Prospect</span>
      <span>·</span>
      <button @click="document.documentElement.dataset.theme = (document.documentElement.dataset.theme==='dark'?'light':'dark'); localStorage.setItem('bp_theme', document.documentElement.dataset.theme);"
              class="hover:text-indigo-500">Alternar tema</button>
    </div>
  </div>
</div>

<script>
function loginPage() {
  return {
    email: '', password: '', loading: false, error: '',
    async submit() {
      this.loading = true; this.error = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email: this.email, password: this.password}),
          credentials: 'include',
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erro ao entrar');
        if (data.user && data.user.role === 'admin') window.location.href = '/admin';
        else window.location.href = '/app';
      } catch (e) {
        this.error = e.message;
      } finally { this.loading = false; }
    }
  }
}
</script>
{% endblock %}
