{% extends "base.html" %}
{% block title %}Entrar — Brainy Prospect{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center px-4 py-10"
     style="background: radial-gradient(circle at 20% 10%, rgba(99,102,241,0.15), transparent 40%), radial-gradient(circle at 80% 80%, rgba(139,92,246,0.15), transparent 40%), #0a0a0f;">
  <div class="w-full max-w-md" x-data="loginPage()">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold tracking-tight">⚡ Brainy Prospect</h1>
      <p class="text-sm text-gray-400 mt-2">Plataforma B2B com IA</p>
    </div>

    <div class="glass rounded-2xl p-8 shadow-2xl">
      <h2 class="text-xl font-semibold mb-6">Entrar na sua conta</h2>

      <form @submit.prevent="submit()" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Email</label>
          <input type="email" required x-model="email" autocomplete="email"
                 class="w-full px-3 py-2.5 rounded-lg" placeholder="voce@empresa.com" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Senha</label>
          <input type="password" required x-model="password" autocomplete="current-password"
                 class="w-full px-3 py-2.5 rounded-lg" placeholder="••••••••" />
        </div>

        <div x-show="error" x-cloak class="text-sm text-red-400 bg-red-950/40 border border-red-900/40 rounded-lg p-3" x-text="error"></div>

        <button type="submit" :disabled="loading"
                class="btn-primary w-full py-2.5 rounded-lg font-semibold text-white disabled:opacity-50">
          <span x-show="!loading">Entrar</span>
          <span x-show="loading" class="pulse">Entrando…</span>
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-gray-400">
        Não tem conta?
        <a href="/register" class="text-indigo-400 hover:text-indigo-300 font-medium">Criar conta</a>
      </div>
    </div>

    <p class="text-xs text-gray-600 text-center mt-6">© 2026 Brainy Prospect</p>
  </div>
</div>

<script>
function loginPage() {
  return {
    email: '', password: '', loading: false, error: '',
    async submit() {
      this.loading = true; this.error = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email: this.email, password: this.password}),
          credentials: 'include',
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erro ao entrar');
        if (data.user && data.user.role === 'admin') window.location.href = '/admin';
        else window.location.href = '/app';
      } catch (e) {
        this.error = e.message;
      } finally { this.loading = false; }
    }
  }
}
</script>
{% endblock %}
